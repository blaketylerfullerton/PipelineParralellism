pipeline:
  num_stages: 1

model:
  name: "unsloth/Llama-3.2-3B"
  arch: "llama"
  max_new_tokens: 64
  temperature: 0.7

quantization:
  weight_mode: "q4_k_m"

llama_cpp:
  # If omitted, deploy/llama_baseline.py derives:
  #   <model.name>-Instruct-GGUF:<quantization.weight_mode>
  # which becomes:
  #   unsloth/Llama-3.2-3B-Instruct-GGUF:Q4_K_M
  n_gpu_layers: 0
  threads: 8
  ctx_size: 4096
  use_mlock: false

network:
  base_port: 5850
  workers:
    - "127.0.0.1"

trust:
  cluster_id: "relay-llama-local"
  auth_token: "local-llama-change-me"
