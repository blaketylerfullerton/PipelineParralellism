pipeline:
  num_stages: 2

model:
  name: "unsloth/Llama-3.2-3B"
  arch: "llama"
  max_new_tokens: 128
  temperature: 0.7

quantization:
  weight_mode: "q4_k_m"

rpc:
  remote_stage: 1
  port: 50052
  bind_host: "0.0.0.0"
  ssh_user: "saturn"
  # Absolute path to rpc-server on the remote spark (source-built with
  # -DGGML_RPC=ON). Must be reachable as the ssh_user above.
  remote_binary: "/home/saturn/llama.cpp/build/bin/rpc-server"
  cache: true
  debug: true
  fit_off: true

bench:
  # Absolute path to llama-bench on the orchestrator spark (spark-b0e1).
  binary: "/home/blakefullerton/llama.cpp/build/bin/llama-bench"
  n_prompt: 0
  n_gen: 128
  repetitions: 3
  threads: 8
  n_gpu_layers: 0
  device: "none"
  output: "json"
