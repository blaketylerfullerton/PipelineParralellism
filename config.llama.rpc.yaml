pipeline:
  num_stages: 2

model:
  name: "unsloth/Llama-3.2-3B"
  arch: "llama"
  max_new_tokens: 128
  temperature: 0.7

quantization:
  weight_mode: "q4_k_m"

rpc:
  remote_stage: 1
  port: 50052
  bind_host: "0.0.0.0"
  ssh_user: "saturn"
  # Homebrew's llama.cpp formula currently installs llama-server and llama-bench
  # but not the standalone rpc-server tool. Point this at a source-built RPC
  # binary on the remote host once you have one.
  remote_binary: "/opt/llama.cpp-rpc/bin/rpc-server"
  cache: true
  debug: true
  fit_off: true

bench:
  binary: "llama-bench"
  n_prompt: 0
  n_gen: 128
  repetitions: 3
  threads: 8
  n_gpu_layers: 0
  device: "none"
  output: "json"
