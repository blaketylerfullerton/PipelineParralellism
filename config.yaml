pipeline:
  num_stages: 2         # 16GB machine = stage 0, 8GB machine = stage 1

model:
  name: "meta-llama/Llama-3.2-1B"   # gated — run `huggingface-cli login` first.
                                    # Non-gated alternative: "unsloth/Llama-3.2-1B"
  arch: "llama"          # gpt2 | llama — picks the stage builder in model.py
  dtype: "bfloat16"      # fp32 | fp16 | bf16 — bf16 is stable for Llama on CPU
  max_new_tokens: 30
  temperature: 1.0

network:
  base_port: 5550
  # For multi-machine: replace with real IPs, one per stage.
  workers:
    - "127.0.0.1"
    - "127.0.0.1"

compression:
  mode: "int8"  # fp32 | fp16 | int8

speculative:
  enabled: false       # off while we validate the Llama pipeline end-to-end.
                       # Re-enable after switching draft.py to a Llama draft model.
  k: 4
  draft_model: "meta-llama/Llama-3.2-1B"

dashboard:
  refresh_rate_hz: 10
