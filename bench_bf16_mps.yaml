pipeline:
  num_stages: 2

model:
  name: "unsloth/Llama-3.2-3B"
  arch: "llama"
  dtype: "bfloat16"
  max_new_tokens: 20
  temperature: 1.0

network:
  base_port: 5810
  workers:
    - "127.0.0.1"
    - "127.0.0.1"

trust:
  cluster_id: "relay-bench-bf16-mps"
  auth_token: "local-bench-change-me"

compression:
  mode: "int8"

quantization:
  weight_mode: "bf16"
  device: "auto"   # picks mps on this Mac

speculative:
  enabled: false
  k: 1
  draft_model: "unsloth/Llama-3.2-1B"
  pipeline_prefetch: false

cascade:
  enabled: false
  confidence_threshold: 0.9

dashboard:
  refresh_rate_hz: 10
