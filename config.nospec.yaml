pipeline:
  num_stages: 2         # 16GB machine = stage 0, 8GB machine = stage 1

model:
  name: "unsloth/Llama-3.2-3B"
  arch: "llama"
  dtype: "bfloat16"
  max_new_tokens: 30
  temperature: 1.0

network:
  base_port: 5750
  workers:
    - "127.0.0.1"
    - "127.0.0.1"

trust:
  cluster_id: "relay-nospec"
  auth_token: "local-nospec-change-me"

compression:
  mode: "int8"

speculative:
  enabled: false
  k: 1
  draft_model: "unsloth/Llama-3.2-1B"
  pipeline_prefetch: false

cascade:
  enabled: false
  confidence_threshold: 0.9

dashboard:
  refresh_rate_hz: 10
