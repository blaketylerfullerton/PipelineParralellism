pipeline:
  num_stages: 2

model:
  name: "unsloth/Llama-3.2-3B"
  arch: "llama"
  # Load bf16 to keep memory footprint down; _apply_dynamic_quant casts to fp32
  # in-place before quantizing.
  dtype: "bfloat16"
  max_new_tokens: 20
  temperature: 1.0

network:
  base_port: 5830
  workers:
    - "127.0.0.1"
    - "127.0.0.1"

compression:
  mode: "int8"

quantization:
  weight_mode: "int8"
  device: "cpu"   # forced regardless; quantize_dynamic is CPU-only

speculative:
  enabled: false
  k: 1
  draft_model: "unsloth/Llama-3.2-1B"
  pipeline_prefetch: false

cascade:
  enabled: false
  confidence_threshold: 0.9

dashboard:
  refresh_rate_hz: 10
